<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepfake Artifact Detector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>Real-Time Deepfake Artifact Detector</h1>
    <p class="disclaimer">{{ disclaimer }}</p>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Live Webcam Analysis</h2>
      <div class="controls">
        <button id="start-camera">Start Camera</button>
        <button id="stop-camera">Stop Camera</button>
      </div>
      <img id="video-feed" src="{{ url_for('main.video_feed') }}" alt="Live analysis feed">
      <div class="score-card">
        <div>Label: <strong id="score-label">idle</strong></div>
        <div>Fake probability: <strong id="score-value">0.00</strong></div>
        <div>Mode: <strong id="score-mode">-</strong></div>
        <div class="meter"><div id="score-bar"></div></div>
      </div>
    </section>

    <section class="panel">
      <h2>Device Camera (Mobile/WebView)</h2>
      <div class="controls">
        <button id="start-device-camera">Start Device Camera</button>
        <button id="stop-device-camera">Stop Device Camera</button>
      </div>
      <label for="mobile-interval-ms">Analyze every (ms)</label>
      <input type="number" id="mobile-interval-ms" min="200" max="5000" value="900">
      <video id="device-camera-preview" playsinline autoplay muted></video>
      <canvas id="device-camera-canvas" width="320" height="240"></canvas>
      <div id="device-camera-status">Idle</div>
    </section>

    <section class="panel">
      <h2>Upload Video</h2>
      <form id="upload-form">
        <input type="file" id="video-file" name="video" accept="video/*" required>
        <label for="sample-stride">Sample every Nth frame</label>
        <input type="number" id="sample-stride" name="sample_stride" min="1" max="30" value="5">
        <button type="submit">Analyze Upload</button>
      </form>
      <pre id="upload-result">Upload a short clip to analyze sampled frames.</pre>
    </section>
  </main>

  <footer>
    <a href="{{ url_for('main.about') }}">About limitations</a>
  </footer>

  <script>
    let deviceStream = null;
    let deviceAnalyzeTimer = null;
    let deviceRequestInFlight = false;

    function setDeviceStatus(text) {
      document.getElementById("device-camera-status").textContent = text;
    }

    function updateScoreCard(data) {
      document.getElementById("score-label").textContent = data.label;
      document.getElementById("score-value").textContent = Number(data.fake_probability || 0).toFixed(2);
      document.getElementById("score-mode").textContent = data.mode || "-";
      const bar = document.getElementById("score-bar");
      bar.style.width = Math.round((data.fake_probability || 0) * 100) + "%";
      bar.style.background = colorForLabel(data.label);
    }

    async function analyzeDeviceFrame() {
      if (!deviceStream || deviceRequestInFlight) return;
      const video = document.getElementById("device-camera-preview");
      if (video.readyState < 2) return;
      deviceRequestInFlight = true;
      const canvas = document.getElementById("device-camera-canvas");
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
      try {
        const response = await fetch("/analyze/frame", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_base64: dataUrl }),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Frame analysis failed");
        }
        updateScoreCard(data);
        setDeviceStatus("Analyzing...");
      } catch (error) {
        setDeviceStatus("Error: " + (error.message || String(error)));
      } finally {
        deviceRequestInFlight = false;
      }
    }

    async function startDeviceCamera() {
      if (deviceStream) return;
      try {
        const constraints = {
          video: {
            facingMode: { ideal: "user" },
            width: { ideal: 640 },
            height: { ideal: 480 },
          },
          audio: false,
        };
        deviceStream = await navigator.mediaDevices.getUserMedia(constraints);
        const video = document.getElementById("device-camera-preview");
        video.srcObject = deviceStream;
        const intervalMs = Math.max(200, Number(document.getElementById("mobile-interval-ms").value || 900));
        deviceAnalyzeTimer = setInterval(analyzeDeviceFrame, intervalMs);
        setDeviceStatus("Camera started");
      } catch (error) {
        setDeviceStatus("Camera permission failed: " + (error.message || String(error)));
      }
    }

    function stopDeviceCamera() {
      if (deviceAnalyzeTimer) {
        clearInterval(deviceAnalyzeTimer);
        deviceAnalyzeTimer = null;
      }
      if (deviceStream) {
        deviceStream.getTracks().forEach((track) => track.stop());
        deviceStream = null;
      }
      const video = document.getElementById("device-camera-preview");
      video.srcObject = null;
      setDeviceStatus("Stopped");
    }

    async function post(url) {
      const response = await fetch(url, { method: "POST" });
      return response.json();
    }

    document.getElementById("start-camera").addEventListener("click", async () => {
      await post("/camera/start");
      document.getElementById("video-feed").src = "{{ url_for('main.video_feed') }}?t=" + Date.now();
    });

    document.getElementById("stop-camera").addEventListener("click", async () => {
      await post("/camera/stop");
    });

    document.getElementById("start-device-camera").addEventListener("click", startDeviceCamera);
    document.getElementById("stop-device-camera").addEventListener("click", stopDeviceCamera);

    async function pollUploadJob(jobId) {
      while (true) {
        const response = await fetch("/analyze/upload/" + jobId);
        const data = await response.json();
        if (data.status === "done") return data.result;
        if (data.status === "failed") {
          throw new Error(data.error || "Upload analysis failed");
        }
        await new Promise((resolve) => setTimeout(resolve, 1200));
      }
    }

    document.getElementById("upload-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData();
      const fileInput = document.getElementById("video-file");
      const sampleStride = document.getElementById("sample-stride").value || "5";
      formData.append("video", fileInput.files[0]);
      formData.append("sample_stride", sampleStride);
      document.getElementById("upload-result").textContent = "Upload queued. Processing...";
      try {
        const response = await fetch("/analyze/upload", { method: "POST", body: formData });
        const queued = await response.json();
        if (!response.ok || !queued.job_id) {
          throw new Error(queued.error || "Upload request failed");
        }
        const data = await pollUploadJob(queued.job_id);
        document.getElementById("upload-result").textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById("upload-result").textContent = JSON.stringify(
          { ok: false, error: String(error.message || error) },
          null,
          2
        );
      }
    });

    function colorForLabel(label) {
      if (label === "likely_manipulated") return "#ff4d4f";
      if (label === "suspicious") return "#faad14";
      return "#52c41a";
    }

    async function pollScore() {
      try {
        const response = await fetch("/api/score");
        const data = await response.json();
        updateScoreCard(data);
      } catch (error) {
        console.error(error);
      }
    }

    setInterval(pollScore, 1000);
  </script>
</body>
</html>
